<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kauneonga Helper · Workstation health</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!--
  Content-Security-Policy: allow the CDN scripts + inline Babel-compiled code.
  Tighten for production (self-host React/Babel and drop 'unsafe-inline').
-->
<link rel="stylesheet" href="helper.css" />
</head>
<body>
<div id="root">
  <div style="font-family: system-ui, sans-serif; padding: 40px; color: #616161;">
    Loading…
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Real Cloudflare speed test (plain JS), exposed as window.ascSpeedTest. -->
<script src="speedtest.js"></script>

<!--
  bootstrap: gate on a Liberty sign-in (skipped entirely when no backend is
  configured, see main.js), then fetch live facts from the preload bridge,
  stash them on window.__KAUNEONGA_FACTS__, and inject the Babel app scripts
  so helper-app.jsx sees real data at module-eval time. Falls back to the mock
  if the bridge is absent (plain browser / design preview).
-->
<script>
function renderLogin(errorText) {
  var root = document.getElementById("root");
  root.innerHTML =
    '<div class="login-screen">' +
      '<div class="login-card">' +
        '<div class="login-brand">Kauneonga Helper</div>' +
        '<div class="login-sub">Sign in with your Liberty account to continue</div>' +
        (errorText ? '<div class="login-error"></div>' : '') +
        '<label class="login-label" for="login-email">Email</label>' +
        '<input class="login-input" type="email" id="login-email" autocomplete="username" />' +
        '<label class="login-label" for="login-password">Password</label>' +
        '<input class="login-input" type="password" id="login-password" autocomplete="current-password" />' +
        '<button class="login-btn" id="login-submit">Sign in</button>' +
      '</div>' +
    '</div>';
  if (errorText) {
    root.querySelector(".login-error").textContent = errorText;
  }
  root.querySelector("#login-submit").addEventListener("click", handleLoginSubmit);
  root.querySelector("#login-password").addEventListener("keydown", function (e) {
    if (e.key === "Enter") handleLoginSubmit();
  });
}

async function handleLoginSubmit() {
  var email = document.getElementById("login-email").value.trim();
  var password = document.getElementById("login-password").value;
  var btn = document.getElementById("login-submit");
  btn.disabled = true;
  btn.textContent = "Signing in…";
  var result = await window.kauneonga.login({ email: email, password: password });
  if (result.ok) {
    loadApp();
  } else {
    renderLogin(result.error || "Sign-in failed. Check your email and password.");
  }
}

async function loadApp() {
  try {
    if (window.kauneonga && window.kauneonga.getFacts) {
      window.__KAUNEONGA_FACTS__ = await window.kauneonga.getFacts();
    }
  } catch (e) {
    console.warn("[Kauneonga Helper] live facts unavailable, using mock:", e);
  }
  document.getElementById("root").innerHTML = "";
  ["icons.jsx", "toast.jsx", "helper-app.jsx"].forEach(function (src) {
    var s = document.createElement("script");
    s.type = "text/babel";
    s.src = src;
    s.setAttribute("data-presets", "react");
    document.body.appendChild(s);
  });
  // Babel auto-transforms scripts added before it finishes; force a pass for
  // any added afterward.
  if (window.Babel && window.Babel.transformScriptTags) {
    window.Babel.transformScriptTags();
  }
}

(async function bootstrap() {
  // Plain browser (no preload bridge) → design preview, skip auth.
  if (!(window.kauneonga && window.kauneonga.hasSession)) {
    loadApp();
    return;
  }
  var signedIn = false;
  try {
    signedIn = await window.kauneonga.hasSession();
  } catch (e) {
    signedIn = false;
  }
  if (signedIn) {
    loadApp();
  } else {
    renderLogin(null);
  }
})();
</script>
</body>
</html>
