<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kauneonga Helper · Workstation health</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!--
  Content-Security-Policy: allow the CDN scripts + inline Babel-compiled code.
  Tighten for production (self-host React/Babel and drop 'unsafe-inline').
-->
<link rel="stylesheet" href="helper.css" />
</head>
<body>
<div id="root">
  <div style="font-family: system-ui, sans-serif; padding: 40px; color: #616161;">
    Scanning workstation…
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Real Cloudflare speed test (plain JS), exposed as window.ascSpeedTest. -->
<script src="speedtest.js"></script>

<!--
  bootstrap: fetch live facts from the preload bridge, stash them on
  window.__KAUNEONGA_FACTS__, THEN inject the Babel app scripts so helper-app.jsx
  sees real data at module-eval time. Falls back to the mock if the bridge is
  absent (plain browser / design preview).
-->
<script>
(async function bootstrap() {
  try {
    if (window.kauneonga && window.kauneonga.getFacts) {
      window.__KAUNEONGA_FACTS__ = await window.kauneonga.getFacts();
    }
  } catch (e) {
    console.warn("[Kauneonga Helper] live facts unavailable, using mock:", e);
  }
  ["icons.jsx", "toast.jsx", "helper-app.jsx"].forEach(function (src) {
    var s = document.createElement("script");
    s.type = "text/babel";
    s.src = src;
    s.setAttribute("data-presets", "react");
    document.body.appendChild(s);
  });
  // Babel auto-transforms scripts added before it finishes; force a pass for
  // any added afterward.
  if (window.Babel && window.Babel.transformScriptTags) {
    window.Babel.transformScriptTags();
  }
})();
</script>
</body>
</html>
